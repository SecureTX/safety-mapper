<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Property Security Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background-color: #f4f7f6; }
        #map { height: calc(100% - 140px); width: 100%; z-content: 0; }
        
        #control-panel { height: 140px; width: 100%; position: absolute; bottom: 0; background: white; border-top: 1px solid #ddd; box-shadow: 0 -3px 10px rgba(0,0,0,0.05); z-index: 1000; display: flex; flex-direction: column; }
        
        .panel-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; }
        
        #status-area { background-color: #f8f9fa; border-bottom: 1px solid #eee; height: 35px;}
        #status-text { font-size: 13px; color: #555; }
        #status-text strong { color: #007bff; }

        .icon-preview { width: 32px; height: 32px; border-radius: 6px; background: white; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .icon-preview img { width: 22px; height: 22px; opacity: 0.8; }
        
        #instruction { color: #888; font-size: 14px; font-weight: 500; }
        
        #button-area { flex-grow: 1; display: flex; justify-content: center; gap: 15px; padding-bottom: 15px; }
        button { border: none; padding: 12px 24px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; min-width: 140px; }
        
        .btn-secondary { background: #e2e6ea; color: #495057; border: 1px solid #ced4da; }
        .btn-secondary:active { background: #dae0e5; }
        
        .btn-primary { background: #007bff; color: white; box-shadow: 0 4px 6px rgba(0,123,255,0.15); }
        .btn-primary:active { background: #0069d9; transform: translateY(1px); }

    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="control-panel">
        <div class="panel-row #status-area">
            <div id="status-text">Cameras Placed: <strong><span id="camera-count">0</span></strong></div>
            <div id="instruction">Tap map to place...</div>
        </div>
        
        <div class="panel-row">
            <div class="icon-preview">
                <img src="https://cdn-icons-png.flaticon.com/512/3061/3061805.png" alt="CCTV">
            </div>
            <div id="button-area">
                <button class="btn-secondary" onclick="resetPlacements()">Clear All</button>
                <button class="btn-primary" onclick="finalizeReport()">Generate Report →</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Setup New Professional Icon (Transparent Dome Camera)
        var cameraIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3061/3061805.png', // Professional dome CCTV
            iconSize: [36, 36], // Increased size slightly
            iconAnchor: [18, 18], // Center it on the tap
            popupAnchor: [0, -18] // Popup appears above
        });

        // 2. Initialize map and Geolocation (same as before)
        var map = L.map('map', {zoomControl: false}).setView([29.4241, -98.4936], 19);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19, attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                map.setView([position.coords.latitude, position.coords.longitude], 19);
                L.circle([position.coords.latitude, position.coords.longitude], {radius: 3, color: '#007bff', fillOpacity: 0.8}).addTo(map);
            });
        }

        // 3. Logic for Unlimited Placements
        var cameraLayerGroup = L.layerGroup().addTo(map); // Store cameras here so we can clear them easily
        var cameraCoords = [];

        map.on('click', function(e) {
            // Place new marker with popup option to remove just one
            var marker = L.marker(e.latlng, {icon: cameraIcon, draggable: true}).addTo(cameraLayerGroup);
            marker.bindPopup("<b>Placement OK?</b><br><button onclick='removeSpecificMarker("+L.stamp(marker)+")' style='background:#dc3545; color:white; padding: 4px 8px; margin-top:5px; border-radius:4px; min-width:60px;'>Delete</button>");
            
            cameraCoords.push({id: L.stamp(marker), coords: e.latlng});
            updateUICount();
        });

        // Functions for managing placements
        function updateUICount() {
            document.getElementById('camera-count').innerText = cameraCoords.length;
        }

        function resetPlacements() {
            cameraLayerGroup.clearLayers();
            cameraCoords = [];
            updateUICount();
        }

        function removeSpecificMarker(id) {
            cameraLayerGroup.eachLayer(function(layer) {
                if (L.stamp(layer) === id) {
                    cameraLayerGroup.removeLayer(layer);
                }
            });
            cameraCoords = cameraCoords.filter(function(item) { return item.id !== id; });
            updateUICount();
        }

        // 4. Finalize Function
        function finalizeReport() {
            if (cameraCoords.length === 0) {
                alert("Please place at least one camera location first!");
                return;
            }
            
            // This is the prompt that shows on mobile when finalized
            var simplifiedCoords = cameraCoords.map(function(item) {
                return [item.coords.lat.toFixed(6), item.coords.lng.toFixed(6)];
            });
            
            var confirmation = "Successfully captured property plan.\n" +
                               "--------------------------------\n" +
                               simplifiedCoords.length + " Total Camera Viewpoints.\n\n" +
                               "Sending coordinates to the safety report automation engine now...";
            
            alert(confirmation);
            
            // NEXT STEP: Send payload to Make.com Webhook
            /* 
            var webhookUrl = "YOUR_MAKE_WEBHOOK_URL_HERE"; 
            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    mapCenter: map.getCenter(),
                    finalizedCameras: simplifiedCoords
                })
            });
            */
        }
    </script>
</body>
</html>
